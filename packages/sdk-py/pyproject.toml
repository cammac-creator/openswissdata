[project]
name = "openswissdata"
version = "0.1.0"
description = "Python SDK for openswissdata.com datasets"
readme = "README.md"
authors = [{name = "Alain Martin", email = "contact@openswissdata.com"}]
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
keywords = ["openswissdata", "swiss", "customs", "tares", "noga", "nace", "isic", "finma"]
dependencies = [
  "pandas>=2.0",
]

[project.urls]
Homepage = "https://openswissdata.com"
Repository = "https://github.com/openswissdata/openswissdata-sdk-py"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openswissdata"]
