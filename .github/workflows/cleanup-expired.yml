name: Cleanup expired rows

# Triggers a server-side cleanup on Railway via the /api/admin/cleanup-expired
# endpoint. The endpoint deletes expired sessions, magic_links, download_tokens,
# mcp_oauth_codes, and prunes old request_log/events rows.
#
# This workflow does NOT have direct access to the Railway DB volume — that's
# why it just fires a curl. The actual work happens server-side, where the
# DB file is reachable.

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Railway cleanup endpoint
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          if [ -z "$ADMIN_SECRET" ]; then
            echo "::error::ADMIN_SECRET secret not configured"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "x-admin-secret: $ADMIN_SECRET" \
            -H "content-type: application/json" \
            https://www.openswissdata.com/api/admin/cleanup-expired)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Body: $body"
          echo "Status: $status"
          if [ "$status" != "200" ]; then
            echo "::error::Cleanup failed with HTTP $status"
            exit 1
          fi
          echo "::notice::Cleanup OK — $body"
