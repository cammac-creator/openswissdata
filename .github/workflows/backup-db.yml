name: Daily SQLite backup → R2

on:
  schedule:
    # Daily at 03:15 UTC (05:15 CEST). 15 min after the typical Railway redeploy
    # window so we don't snapshot during a deploy.
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The backup script reads the LIVE Railway DB by mounting it via a
      # short-lived `railway run` command. Requires RAILWAY_TOKEN secret.
      # Alternative: run this workflow on Railway's scheduled service
      # directly (no GitHub Actions needed) — that is the recommended path
      # if the Railway CLI fails in CI.
      - name: Run backup against production DB
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          DATABASE_PATH: ./data/openswissdata.sqlite
        run: |
          # Pull latest DB from Railway via scp/rsync if available, otherwise
          # fall back to running this workflow on Railway directly.
          # For now, this workflow assumes the DB is checked out via Railway
          # volume snapshot or run on Railway scheduled service.
          npm run backup:db
